# Render 部署配置
services:
  - type: web
    name: wallstreet-python
    env: docker
    region: oregon
    plan: free
    rootDir: server-python
    dockerfilePath: Dockerfile
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: SMS_PROVIDER
        value: mock
