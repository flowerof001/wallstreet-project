name: wallstreet
description: WallstreetProject - 全平台实时股票行情系统
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  http: ^1.1.0
  web_socket_channel: ^2.4.0
  intl: ^0.20.2
  fl_chart: ^0.70.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/i18n/locales/
    - lib/i18n/locales/en.json
    - lib/i18n/locales/zh_CN.json
